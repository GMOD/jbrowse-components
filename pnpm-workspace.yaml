packages:
  - 'packages/*'
  - 'products/*'
  - 'plugins/*'
  - 'tools/gfa-to-tabix'
  - 'tools/graph-truth-extractor'
allowBuilds:
  canvas: true
  electron: true
  electron-chromedriver: true
  esbuild: true
  puppeteer: true
  unrs-resolver: set this to true or false
minimumReleaseAge: '1440'
minimumReleaseAgeExclude:
  - '@gmod/*'
