packages:
  - 'packages/*'
  - 'products/*'
  - 'products/*/examples-site'
  - 'plugins/*'
  # Worked examples backing the developer guides. Private (never published);
  # consumed as packed tarballs by component_tests/plugin-vite, which is how a
  # third-party plugin actually resolves @jbrowse/* packages.
  - 'example-plugins/*'
  - 'website'
overrides:
  '@babel/core': '^8.0.1'
blockExoticSubdeps: true
allowBuilds:
  canvas: true
  core-js-pure: true
  electron: true
  electron-chromedriver: true
  esbuild: true
  puppeteer: true
  sharp: true
  unrs-resolver: true
minimumReleaseAge: '1440'
minimumReleaseAgeExclude:
  - '@gmod/*'
  - 'ixixx'
  - 'gff-nostream'
  - 'electron'
  - 'generic-filehandle2'
  - '@jbrowse/mobx-state-tree'
  - 'typescript'
  - '@typescript/*'
  - 'astro'
