# Workspace-root marker so pnpm treats this app as its own project instead of
# attaching it to the repo-root workspace. The overrides below pin the whole
# @jbrowse/* closure to packed tarballs; they live here rather than in
# package.json because pnpm 11 dropped that field and ignores it silently.
allowBuilds:
  esbuild: true
  puppeteer: true

# BEGIN packed-overrides (generated by scripts/pack.ts, do not edit by hand)
overrides:
  '@jbrowse/alignments-core': 'file:./packed/jbrowse-alignments-core.tgz'
  '@jbrowse/cigar-utils': 'file:./packed/jbrowse-cigar-utils.tgz'
  '@jbrowse/core': 'file:./packed/jbrowse-core.tgz'
  '@jbrowse/embedded-core': 'file:./packed/jbrowse-embedded-core.tgz'
  '@jbrowse/ld-core': 'file:./packed/jbrowse-ld-core.tgz'
  '@jbrowse/modifications-utils': 'file:./packed/jbrowse-modifications-utils.tgz'
  '@jbrowse/plugin-alignments': 'file:./packed/jbrowse-plugin-alignments.tgz'
  '@jbrowse/plugin-arc': 'file:./packed/jbrowse-plugin-arc.tgz'
  '@jbrowse/plugin-authentication': 'file:./packed/jbrowse-plugin-authentication.tgz'
  '@jbrowse/plugin-bed': 'file:./packed/jbrowse-plugin-bed.tgz'
  '@jbrowse/plugin-canvas': 'file:./packed/jbrowse-plugin-canvas.tgz'
  '@jbrowse/plugin-config': 'file:./packed/jbrowse-plugin-config.tgz'
  '@jbrowse/plugin-data-management': 'file:./packed/jbrowse-plugin-data-management.tgz'
  '@jbrowse/plugin-gccontent': 'file:./packed/jbrowse-plugin-gccontent.tgz'
  '@jbrowse/plugin-gff3': 'file:./packed/jbrowse-plugin-gff3.tgz'
  '@jbrowse/plugin-gtf': 'file:./packed/jbrowse-plugin-gtf.tgz'
  '@jbrowse/plugin-gwas': 'file:./packed/jbrowse-plugin-gwas.tgz'
  '@jbrowse/plugin-legacy-jbrowse': 'file:./packed/jbrowse-plugin-legacy-jbrowse.tgz'
  '@jbrowse/plugin-linear-genome-view': 'file:./packed/jbrowse-plugin-linear-genome-view.tgz'
  '@jbrowse/plugin-maf': 'file:./packed/jbrowse-plugin-maf.tgz'
  '@jbrowse/plugin-score-example': 'file:./packed/jbrowse-plugin-score-example.tgz'
  '@jbrowse/plugin-sequence': 'file:./packed/jbrowse-plugin-sequence.tgz'
  '@jbrowse/plugin-trix': 'file:./packed/jbrowse-plugin-trix.tgz'
