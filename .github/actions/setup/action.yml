name: Setup
description: Install pnpm + Node and (optionally) project dependencies

# Shared preamble for every pnpm-based job. Checkout must run in the job before
# this (a local composite action needs the repo already on disk), so this owns
# only the pnpm/Node/install trio — the part that was hand-duplicated ~20x with
# its pinned SHAs and version numbers kept in sync by hand.
inputs:
  node-version:
    description: Node version for actions/setup-node
    default: '24'
  registry-url:
    description: npm registry to configure (for publish/provenance jobs)
    default: ''
  install:
    description: Run `pnpm install --frozen-lockfile` (set 'false' to skip)
    default: 'true'
  working-directory:
    description: Directory to install in when install is enabled
    default: '.'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: 10
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
    - if: inputs.install == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
