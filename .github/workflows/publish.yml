name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          registry-url: 'https://registry.npmjs.org'
      # npm never infers a dist-tag from prerelease semver, it publishes as
      # 'latest' unless told otherwise, which would serve a beta to every
      # `npm install` and to the unpkg @latest URLs in the docs. 'latest' is
      # npm's own default, so stable tags behave exactly as before.
      - run:
          pnpm publish -r --access public --no-git-checks --provenance --tag
          "$NPM_TAG"
        env:
          NPM_TAG: ${{ contains(github.ref_name, '-') && 'next' || 'latest' }}
