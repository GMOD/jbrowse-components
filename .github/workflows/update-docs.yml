name: Upload website
on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLOUDFRONT_DISTRIBUTION_ID: E13LGELJOT4GQO

jobs:
  build:
    name: Build and upload website to production
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'update docs')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          working-directory: website
      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Build website
        run: pnpm build
        working-directory: website
        env:
          PUBLIC_NEWSLETTER_API_URL: ${{ secrets.PUBLIC_NEWSLETTER_API_URL }}
      - name: Upload to S3 and invalidate CloudFront cache
        run: |
          rclone --config rclone.conf sync disthash: s3:jbrowse.org/jb2 --checksum --fast-list
          # Also publish llms.txt at the domain root — the location AI tools
          # look for it (llmstxt.org). Its links are already absolute /jb2 URLs,
          # so the same file works verbatim at the apex.
          aws s3 cp dist/llms.txt s3://jbrowse.org/llms.txt \
            --region us-east-1 --content-type "text/plain; charset=utf-8"
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/jb2/*" "/llms.txt"
        working-directory: website
