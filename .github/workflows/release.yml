name: Release
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CLOUDFRONT_DISTRIBUTION_ID: E13LGELJOT4GQO

jobs:
  createrelease:
    name: Create release tag and JBrowse web release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> "$GITHUB_ENV"
      - name: Build jbrowse-web
        uses: ./.github/actions/build-jbrowse-web
      # Upload the pristine build (before the versioned zip is added to it) so
      # buildjbrowseweb can deploy the same bytes to latest/ without rebuilding.
      - name: Upload jbrowse-web build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jbrowse-web-build
          path: products/jbrowse-web/build
          include-hidden-files: true
          retention-days: 1
      - name: Zip jbrowse-web build
        working-directory: products/jbrowse-web/build
        run: zip -r "jbrowse-web-${RELEASE_VERSION}.zip" .
      - name: Create draft release with jbrowse-web artifact
        run: |
          gh release create "${RELEASE_VERSION}" \
            ./products/jbrowse-web/build/jbrowse-web-${RELEASE_VERSION}.zip \
            --draft \
            --title "Release ${RELEASE_VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  buildwindows:
    needs: createrelease
    name: Build Windows desktop app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # install: false — pnpm install must run after the Wine/native build deps
      # below so native modules rebuild against them.
      - uses: ./.github/actions/setup
        with:
          install: 'false'
      - name: Setup java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          # eclipse 'temurin' openjdk https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Selecting-a-Java-distribution
          distribution: 'temurin'
          java-version: '21'
      - name: Install build deps and Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine wine32 wine64 libwine libwine:i386 fonts-wine \
            python3 make gcc libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Install NSIS under Wine
        env:
          WINEPREFIX: /tmp/wine
        run: |
          # Initialize Wine prefix first (suppress GUI prompts)
          WINEDLLOVERRIDES="mscoree,mshtml=" wineboot --init
          # Download and install NSIS silently
          wget -q https://downloads.sourceforge.net/project/nsis/NSIS%203/3.12/nsis-3.12-setup.exe -O /tmp/nsis-setup.exe
          wine /tmp/nsis-setup.exe /S
          rm /tmp/nsis-setup.exe
          # Verify NSIS installation
          wine "C:\\Program Files (x86)\\NSIS\\makensis.exe" /VERSION
      - name: Get ssl.com esigner zip file and unzip
        # We use the tool directly rather than the GitHub Action: https://github.com/SSLcom/esigner-codesign
        run: |
          mkdir products/jbrowse-desktop/code_signer
          cd products/jbrowse-desktop/code_signer
          wget https://www.ssl.com/download/codesigntool-for-linux-and-macos -O out.zip
          unzip out.zip
          chmod +x CodeSignTool.sh
          cd ../../../
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build app
        env:
          WINEPREFIX: /tmp/wine
          WINDOWS_SIGN_USER_NAME: ${{ secrets.WINDOWS_SIGN_USER_NAME }}
          WINDOWS_SIGN_USER_PASSWORD: ${{ secrets.WINDOWS_SIGN_USER_PASSWORD }}
          WINDOWS_SIGN_CREDENTIAL_ID: ${{ secrets.WINDOWS_SIGN_CREDENTIAL_ID }}
          WINDOWS_SIGN_USER_TOTP: ${{ secrets.WINDOWS_SIGN_USER_TOTP }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release-electron:win
        working-directory: products/jbrowse-desktop

  buildmac:
    needs: createrelease
    name: Build Mac desktop app
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # install: false — pnpm install must run after the brew native build deps
      # below so native modules rebuild against them.
      - uses: ./.github/actions/setup
        with:
          install: 'false'
      - name: Install build dependencies
        run: |
          brew install pkg-config cairo pango libpng jpeg giflib librsvg
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$CSC_LINK" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $RUNNER_TEMP/certificate.p12
      - name: Build Mac app
        env:
          APPLE_ID: ${{ secrets.APPLEID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLEIDPASS }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release-electron:mac
        working-directory: products/jbrowse-desktop
      - name: Clean up keychain
        if: always()
        run:
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  buildlinux:
    needs: createrelease
    name: Build Linux desktop app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # install: false — pnpm install must run after the native build deps below
      # so native modules rebuild against them.
      - uses: ./.github/actions/setup
        with:
          install: 'false'
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 make gcc libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Linux app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release-electron:linux
        working-directory: products/jbrowse-desktop

  buildjbrowseweb:
    name: Deploy jbrowse-web to latest folder on tag
    # Reuse the build createrelease already produced instead of rebuilding.
    needs: createrelease
    # Only stable tags update the canonical latest/ folder; a prerelease tag
    # (v4.4.0-beta.1 etc, which carries a '-') must not overwrite it.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download jbrowse-web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jbrowse-web-build
          path: products/jbrowse-web/build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Copy branch build to S3
        run: |
          cd products/jbrowse-web/build && zip -r jbrowse-web-latest.zip . && cd -
          cp products/jbrowse-web/build/test_data/config.json products/jbrowse-web/build/config.json
          aws s3 sync products/jbrowse-web/build s3://jbrowse.org/code/jb2/latest/
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/code/jb2/latest/*"
