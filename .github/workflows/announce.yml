name: Announce release
# Manually triggered AFTER a release is published and verified. Fans out to
# Bluesky, Mastodon, and the email newsletter in one shot. Defaults to a dry
# run — flip `dry_run` to false to actually send.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (default: newest blog post, e.g. v4.3.1)'
        required: false
        type: string
      dry_run:
        description: 'Preview only — send nothing'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  announce:
    name: Post to Bluesky, Mastodon, and newsletter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      # Only needed for the newsletter Lambda invoke.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Announce
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE: https://genomic.social
          NEWSLETTER_LAMBDA: jbrowse-newsletter-send
          # Pass inputs via env, not ${{ }} interpolation, so a tag value
          # cannot inject shell commands into the run script.
          INPUT_TAG: ${{ inputs.tag }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=()
          [ -n "$INPUT_TAG" ] && args+=(--tag "$INPUT_TAG")
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          node scripts/announce.mjs "${args[@]}"
