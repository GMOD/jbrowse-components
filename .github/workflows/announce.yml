name: Announce release
# Fans out to Bluesky, Mastodon, and the email newsletter in one shot. Fires
# automatically when a GitHub release is published (the human gate is clicking
# "publish" on the draft release), and can also be run manually — the manual
# path defaults to a dry run so it's safe for previewing.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (default: newest blog post, e.g. v4.3.1)'
        required: false
        type: string
      dry_run:
        description: 'Preview only — send nothing'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  announce:
    name: Post to Bluesky, Mastodon, and newsletter
    # Skip prereleases on the automatic path; a manual dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.release.prerelease == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      # Only needed for the newsletter Lambda invoke.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Announce
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE: https://genomic.social
          NEWSLETTER_LAMBDA: jbrowse-newsletter-send
          # Pass inputs via env, not ${{ }} interpolation, so a tag value
          # cannot inject shell commands into the run script. On the automatic
          # release path there's no dispatch input, so use the release tag and
          # send for real; a manual dispatch honors its own dry_run toggle.
          INPUT_TAG: ${{ inputs.tag || github.event.release.tag_name }}
          DRY_RUN:
            ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run ||
            'false' }}
        run: |
          args=()
          [ -n "$INPUT_TAG" ] && args+=(--tag "$INPUT_TAG")
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          node scripts/announce.mjs "${args[@]}"
