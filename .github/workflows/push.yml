name: Push

on:
  push:
    branches:
      # '**' (not '*') so branches containing '/' (dependabot/*, port/*, …)
      # also get CI — '*' does not match across slashes.
      - '**'
    tags:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLOUDFRONT_DISTRIBUTION_ID: E13LGELJOT4GQO

jobs:
  check_commit_message:
    name: Check Commit Message
    runs-on: ubuntu-latest
    outputs:
      skip_jobs: ${{ steps.check_message.outputs.skip_jobs }}
    steps:
      - name: Check commit message
        id: check_message
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use env variable for safe expansion of special characters like quotes.
          if [[ "$COMMIT_MSG" == *"[update docs only]"* ]]; then
            echo "skip_jobs=true" >> $GITHUB_OUTPUT
            echo "Commit message contains [update docs only], skipping regular push jobs"
          else
            echo "skip_jobs=false" >> $GITHUB_OUTPUT
            echo "Running regular push jobs"
          fi

  test:
    name: Test
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get -y install tabix
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Test codebase
        id: tests
        run: pnpm test-ci
        continue-on-error: true
      - name: Configure AWS credentials
        if: steps.tests.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Upload jest image snapshot diffs to S3
        if: steps.tests.outcome == 'failure'
        run: |
          SNAPSHOTS_DIR="products/jbrowse-web/src/tests/__image_snapshots__/__diff_output__"
          S3_PATH="s3://jbrowse.org/demos/imagediff/${{ github.run_id }}"

          if ls ${SNAPSHOTS_DIR}/*.png 1> /dev/null 2>&1; then
            echo "Uploading jest image snapshot diffs to S3..."
            aws s3 cp ${SNAPSHOTS_DIR}/ ${S3_PATH}/ --recursive --exclude "*" --include "*.png"

            echo ""
            echo "============================================"
            echo "JEST SNAPSHOT DIFF IMAGES UPLOADED TO S3"
            echo "============================================"
            for file in ${SNAPSHOTS_DIR}/*.png; do
              filename=$(basename "$file")
              echo "https://jbrowse.org/demos/imagediff/${{ github.run_id }}/${filename}"
            done
            echo "============================================"
          else
            echo "No jest snapshot diff files found"
          fi
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1

  typecheck:
    name: Typecheck
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck codebase
        run: pnpm typecheck

  lint:
    name: Lint
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev glslang-tools
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Check @jbrowse/core exports are up-to-date
        run: |
          node packages/core/scripts/generateExports.mjs
          if ! git diff --quiet packages/core/package.json; then
            echo "Error: @jbrowse/core exports are out of date!"
            echo "Run 'node packages/core/scripts/generateExports.mjs' and commit the changes."
            git diff packages/core/package.json
            exit 1
          fi
      - name: Check guide indexes are up to date
        run:
          node --experimental-strip-types
          website/scripts/generate-guide-indexes.ts --check
      - name: Check doc code/path references resolve
        run:
          node --experimental-strip-types website/scripts/check-doc-imports.ts
      - name: Check every doc is reachable from the sidebar
        run: node --experimental-strip-types website/scripts/check-sidebar.ts
      - name: Check color tables are up to date
        run: node --experimental-strip-types docs/generateColorDocs.ts --check
      - name: Check jexl catalog is up to date
        run: node --experimental-strip-types docs/generateJexlDocs.ts --check
      - name: Check extension point index is up to date
        run:
          node --experimental-strip-types docs/generateExtensionPointDocs.ts
          --check
      - name: Check config/model/api docs are up to date
        run: |
          pnpm gendocs
          if ! git diff --quiet website/docs/config website/docs/models website/docs/api; then
            echo "Error: generated docs are out of date!"
            echo "Run 'pnpm autogen' and commit the changes."
            git diff --stat website/docs/config website/docs/models website/docs/api
            exit 1
          fi
      - name: Check generated shaders are up to date
        # slangc is auto-fetched + version-pinned by the build script, so the
        # generated output is deterministic; glslang-tools (installed above)
        # validates the GLSL-ES fallback. A stale *.generated.ts (hand-edited,
        # or a .slang changed without running gen:shaders) fails the diff.
        run: |
          pnpm gen:shaders
          if ! git diff --quiet -- '**/*.generated.ts'; then
            echo "Error: generated shaders are out of date!"
            echo "Run 'pnpm gen:shaders' and commit the changes."
            git diff --stat -- '**/*.generated.ts'
            exit 1
          fi
      - name: Lint codebase
        run: pnpm lint:strict

  format:
    name: Format
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Check codebase format
        run: pnpm prettier --check .

  typecheck_infrastructure:
    name: Typecheck infrastructure
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: npm ci
        working-directory: infrastructure/newsletter
      - name: Typecheck newsletter infrastructure
        run: npm run typecheck
        working-directory: infrastructure/newsletter

  spellcheck:
    name: Spell check
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check spelling
        uses: crate-ci/typos@f8a58b6b53f2279f71eb605f03a4ae4d10608f45 # v1.47.0

  build_and_pack_artifacts:
    name: Build and pack artifacts
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install tabix libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Pack artifacts for component tests
        run: node --experimental-strip-types scripts/pack.ts
      - name: Test build
        run: BUILT_TESTS=1 pnpm built-test-ci
      - name: Upload packed artifacts for component tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packed-artifacts
          path: component_tests/*/packed/
          retention-days: 1

  deploy:
    name: Build and deploy jbrowse-web to S3
    needs: check_commit_message
    # Skip the per-branch S3 preview for Dependabot branches — nobody shares a
    # preview URL for a dep bump. Build/smoke jobs still run to catch breakage.
    if:
      needs.check_commit_message.outputs.skip_jobs != 'true' &&
      !startsWith(github.ref_name, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Sanitize branch/tag name for S3 path safety
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Collapse slashes to dashes so nested branch names (dependabot/*,
          # port/*, …) map to a flat, traversal-safe S3 prefix, then assert the
          # result is only [A-Za-z0-9_.-].
          SAFE_REF="${REF_NAME//\//-}"
          if ! [[ "$SAFE_REF" =~ ^[a-zA-Z0-9_.\-]+$ ]]; then
            echo "Error: ref name '$REF_NAME' has characters unsafe for an S3 path"
            exit 1
          fi
          echo "Ref name sanitized to: $SAFE_REF"
          echo "REF_NAME=$SAFE_REF" >> "$GITHUB_ENV"
      - name: Build jbrowse-web
        run: |
          cd products/jbrowse-web/
          NODE_OPTIONS='--max-old-space-size=6500' pnpm build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Deploy to S3
        run: |
          cd products/jbrowse-web/build
          zip -r "jbrowse-web-${REF_NAME}.zip" .
          cp test_data/config.json config.json
          aws s3 sync --delete --exclude="*.map" . s3://jbrowse.org/code/jb2/${REF_NAME}
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/code/jb2/${REF_NAME}/*"

      # The Astro examples-sites replace the old per-package Storybooks at the
      # same public URLs (/storybook/{lgv,app,cgv}/). Their astro `base` is the
      # fixed, unversioned prefix, so each deploys to the prefix root. No
      # --delete: the canonical site overlays the prefix without touching any
      # historical per-ref Storybook subdirs (e.g. /storybook/lgv/v3.0.0/).
      - name: Build and deploy LGV examples-site
        if:
          github.ref == 'refs/heads/main' || startsWith(github.ref,
          'refs/tags/')
        run: |
          pnpm --filter lgv-examples-site build
          aws s3 sync products/jbrowse-react-linear-genome-view/examples-site/dist s3://jbrowse.org/storybook/lgv
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/storybook/lgv/*"

      - name: Build and deploy React App examples-site
        if:
          github.ref == 'refs/heads/main' || startsWith(github.ref,
          'refs/tags/')
        run: |
          pnpm --filter app-examples-site build
          aws s3 sync products/jbrowse-react-app/examples-site/dist s3://jbrowse.org/storybook/app
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/storybook/app/*"

      - name: Build and deploy CGV examples-site
        if:
          github.ref == 'refs/heads/main' || startsWith(github.ref,
          'refs/tags/')
        run: |
          pnpm --filter cgv-examples-site build
          aws s3 sync products/jbrowse-react-circular-genome-view/examples-site/dist s3://jbrowse.org/storybook/cgv
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/storybook/cgv/*"

  # Builds each Astro examples-site with Vite/Rollup (whose strict ESM surfaces
  # circular-dependency init-order errors that webpack tolerates), then loads
  # every page in headless Chrome. The web-worker examples assert an RPC worker
  # actually spawns — the guard for the TextSearchManager-class of TDZ crashes.
  # See products/jbrowse-react-linear-genome-view/examples-site/MIGRATION.md.
  examples_site_smoke:
    name: Smoke-test ${{ matrix.site }} examples-site
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: [lgv-examples-site, app-examples-site, cgv-examples-site]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck examples-site
        run: pnpm --filter ${{ matrix.site }} typecheck
      - name: Build examples-site
        run: pnpm --filter ${{ matrix.site }} build
      - name: Smoke-test examples-site
        run: pnpm --filter ${{ matrix.site }} smoke

  buildwebsite:
    name: Build website
    needs: check_commit_message
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: website
      - name: Typecheck website
        run: pnpm typecheck
        working-directory: website
      - name: Build website
        run: |
          cd website/
          pnpm build
          mkdir testing
          mv dist testing/jb2
      - name: Check website links
        uses: untitaker/hyperlink@fb5bb9c5011a3d143a54b4b30aedc30ec5bc0f89 # 0.2.0
        with:
          args: website/testing/ --check-anchors

  # Separate job for component_tests with no permissions.
  # These tests install npm packages without a yarn.lock, so untrusted
  # dependencies could potentially run malicious code. By isolating this
  # in a job with `permissions: {}`, we ensure that even if a rogue
  # dependency executes, it has no GitHub token access and cannot push
  # code, create issues/PRs, access secrets, or call GitHub APIs.
  component_tests:
    name: Test embedded components
    needs: [check_commit_message, build_and_pack_artifacts]
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packed-artifacts
          path: component_tests/
      - name: Test embedded components
        run: |
          for dir in component_tests/lgv-vite component_tests/cgv-vite component_tests/app-vite; do
            echo "Testing $dir"
            (cd $dir && yarn install && yarn e2e)
          done

  # Test CLI on Node 18 to ensure compatibility with older Node versions.
  # This job has no permissions since it installs npm packages without a lockfile.
  test_cli_compat:
    name: Test CLI on Node 18
    needs: [check_commit_message, build_and_pack_artifacts]
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '18'
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packed-artifacts
          path: component_tests/
      - name: Test CLI on Node 18
        run: |
          cd component_tests/cli-node18
          yarn install
          yarn testcli

  # Test @jbrowse/img to ensure the jb2export CLI works.
  # Requires Node ~24 for module.registerHooks API.
  # This job has no permissions since it installs npm packages without a lockfile.
  test_jbrowse_img:
    name: Test @jbrowse/img
    needs: [check_commit_message, build_and_pack_artifacts]
    if: needs.check_commit_message.outputs.skip_jobs != 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packed-artifacts
          path: component_tests/
      - name: Test @jbrowse/img
        run: |
          cd component_tests/jbrowse-img
          yarn install
          yarn testimg

  windows_electron_e2e:
    name: Windows Electron E2E Tests
    needs: [check_commit_message, test, typecheck, lint, format]
    if:
      needs.check_commit_message.outputs.skip_jobs != 'true' && github.ref ==
      'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '24'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build and test Electron on Windows
        run: pnpm test:e2e:ci:win
        working-directory: products/jbrowse-desktop
        env:
          NO_MINIMIZE: true
