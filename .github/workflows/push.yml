name: Push

on:
  push:
    branches:
      # '**' (not '*') so branches containing '/' (dependabot/*, port/*, …)
      # also get CI — '*' does not match across slashes.
      - '**'
    tags:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLOUDFRONT_DISTRIBUTION_ID: E13LGELJOT4GQO

# A commit with '[update docs only]' in its message skips CI. Each job gates on
# this inline via its `if:` rather than depending on a separate gate job, which
# would serialize the whole pipeline behind one cold runner. (Job-level `if:`
# can't read workflow `env`, so the expression is repeated verbatim.)

jobs:
  test:
    name: Test
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get -y install tabix
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Test codebase
        id: tests
        run: pnpm test-ci
        continue-on-error: true
      - name: Configure AWS credentials
        if: steps.tests.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Upload jest image snapshot diffs to S3
        if: steps.tests.outcome == 'failure'
        run: |
          SNAPSHOTS_DIR="products/jbrowse-web/src/tests/__image_snapshots__/__diff_output__"
          S3_PATH="s3://jbrowse.org/demos/imagediff/${{ github.run_id }}"

          if ls ${SNAPSHOTS_DIR}/*.png 1> /dev/null 2>&1; then
            echo "Uploading jest image snapshot diffs to S3..."
            aws s3 cp ${SNAPSHOTS_DIR}/ ${S3_PATH}/ --recursive --exclude "*" --include "*.png"

            echo ""
            echo "============================================"
            echo "JEST SNAPSHOT DIFF IMAGES UPLOADED TO S3"
            echo "============================================"
            for file in ${SNAPSHOTS_DIR}/*.png; do
              filename=$(basename "$file")
              echo "https://jbrowse.org/demos/imagediff/${{ github.run_id }}/${filename}"
            done
            echo "============================================"
          else
            echo "No jest snapshot diff files found"
          fi
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0

  typecheck:
    name: Typecheck
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Typecheck codebase
        run: pnpm typecheck
      - name: Check tsconfig project references are in sync with package.json
        run: pnpm gen-tsconfig-refs --check

  lint:
    name: Lint
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev glslang-tools
      - name: Install naga (WGSL validator)
        # glslang-tools validates the GLSL-ES fallback; naga validates the
        # primary WebGPU (WGSL) output. build-shaders.ts probes for `naga` and
        # runs it when present, so installing it here turns WGSL validation on
        # in CI. cargo is preinstalled on the ubuntu runner. If a new naga
        # release ever churns CI, pin a version here (`naga-cli@<ver>`).
        run: cargo install naga-cli --locked
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Fast lint (oxlint) — fail fast before slower checks
        run: pnpm lint:fast
      - name: Check @jbrowse/core exports are up-to-date
        run: |
          node packages/core/scripts/generateExports.mjs
          if ! git diff --quiet packages/core/package.json; then
            echo "Error: @jbrowse/core exports are out of date!"
            echo "Run 'node packages/core/scripts/generateExports.mjs' and commit the changes."
            git diff packages/core/package.json
            exit 1
          fi
      - name: Check guide indexes are up to date
        run: node website/scripts/generate-guide-indexes.ts --check
      - name: Check README-derived docs are up to date
        run:
          node website/scripts/generate-img-doc.ts --check && node
          website/scripts/generate-cli-doc.ts --check
      - name: Check gallery links are up to date
        run: node website/scripts/gen-gallery-links.ts --check
      # Round-trips every figure's jbrowse:// link through Desktop's
      # parseProtocolUrl and app-core's parseSessionSpecUrl — three modules only
      # unit-tested apart — and checks the committed list of spec fields with no
      # recipe click-path. Neither half ran anywhere before: the script is not
      # part of `astro build`, so a broken "Open in Desktop" link could ship.
      - name: Check figure recipes round-trip and their field list is current
        run: node website/scripts/check-spec-recipes.ts --check
      - name: Check homepage images are up to date
        run: node website/scripts/gen-home-images.ts --check
      - name: Check doc code/path references resolve
        run: node website/scripts/check-doc-imports.ts
      # Fences carrying an `<!-- include: -->` marker must match the real source
      # file they name. check-doc-imports only validates import *specifiers*, so
      # without this a guide can teach an undefined type or a renamed API while
      # every other check stays green.
      - name: Check doc snippets match their source
        run: node website/scripts/sync-doc-snippets.ts --check
      - name: Check every doc is reachable from the sidebar
        run: node website/scripts/check-sidebar.ts
      - name: Check tutorial build scripts are valid
        run: python3 scripts/check-build-scripts.py
      - name: Check color tables are up to date
        run: node docs/generateColorDocs.ts --check
      - name: Check jexl catalog is up to date
        run: node docs/generateJexlDocs.ts --check
      - name: Check extension point index is up to date
        run: node docs/generateExtensionPointDocs.ts --check
      - name: Check file type tables are up to date
        run: node docs/generateFileTypeDocs.ts --check
      - name: Check display foundations table is up to date
        run: node docs/generateDisplayFoundationDocs.ts --check
      - name: Check config/model/api docs are up to date
        # config_guides is included because gendocs also rewrites the marker
        # blocks embedded in the hand-written guides (DISPLAY_TYPES, which needs
        # the whole-repo DisplayType scan generate.ts does, and FILE_TYPES).
        run: |
          pnpm gendocs
          if ! git diff --quiet website/docs/config website/docs/models website/docs/api website/docs/config_guides; then
            echo "Error: generated docs are out of date!"
            echo "Run 'pnpm autogen' and commit the changes."
            git diff --stat website/docs/config website/docs/models website/docs/api website/docs/config_guides
            exit 1
          fi
      - name: Check generated shaders are up to date
        # slangc is auto-fetched + version-pinned by the build script, so the
        # generated output is deterministic; naga validates the WGSL (WebGPU)
        # and glslang-tools the GLSL-ES fallback (both installed above). A stale
        # *.generated.ts (hand-edited, or a .slang changed without running
        # gen:shaders) fails the diff.
        run: |
          pnpm gen:shaders
          if ! git diff --quiet -- '**/*.generated.ts'; then
            echo "Error: generated shaders are out of date!"
            echo "Run 'pnpm gen:shaders' and commit the changes."
            git diff --stat -- '**/*.generated.ts'
            exit 1
          fi
      - name: Type-aware lint (oxlint + tsgolint)
        run: pnpm lint
      - name: Lint backstop (eslint — react-compiler + guards oxlint can't do)
        run: pnpm lint:eslint

  format:
    name: Format
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Check codebase format
        run: pnpm check-format

  typecheck_infrastructure:
    name: Typecheck infrastructure
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Install deps
        run: npm ci
        working-directory: infrastructure/newsletter
      - name: Typecheck newsletter infrastructure
        run: npm run typecheck
        working-directory: infrastructure/newsletter

  # blat-proxy is a standalone pnpm project (its own lockfile + pnpm-workspace.yaml
  # workspace-root marker), not a member of the root workspace, so it installs and
  # runs independently in aws/blat-proxy.
  blat_proxy:
    name: Test blat-proxy Lambda
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          working-directory: aws/blat-proxy
      - name: Typecheck
        run: pnpm typecheck
        working-directory: aws/blat-proxy
      - name: Test
        run: pnpm test
        working-directory: aws/blat-proxy
      - name: Build bundle
        run: pnpm build
        working-directory: aws/blat-proxy

  spellcheck:
    name: Spell check
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check spelling
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

  build_and_pack_artifacts:
    name: Build and pack artifacts
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install tabix libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Pack artifacts for component tests
        run: node scripts/pack.ts
      - name: Check emitted .d.ts don't name workspace source paths
        run: pnpm check-declaration-leaks
      - name: Test build
        run: BUILT_TESTS=1 pnpm built-test-ci
      - name: Upload packed artifacts for component tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packed-artifacts
          path: component_tests/*/packed/
          retention-days: 1

  deploy:
    name: Build and deploy jbrowse-web to S3
    # Skip the per-branch S3 preview for Dependabot branches — nobody shares a
    # preview URL for a dep bump. Build/smoke jobs still run to catch breakage.
    if:
      ${{ !contains(github.event.head_commit.message, '[update docs only]') &&
      !startsWith(github.ref_name, 'dependabot/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Sanitize branch/tag name for S3 path safety
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Collapse slashes to dashes so nested branch names (dependabot/*,
          # port/*, …) map to a flat, traversal-safe S3 prefix, then assert the
          # result is only [A-Za-z0-9_.-].
          SAFE_REF="${REF_NAME//\//-}"
          if ! [[ "$SAFE_REF" =~ ^[a-zA-Z0-9_.\-]+$ ]]; then
            echo "Error: ref name '$REF_NAME' has characters unsafe for an S3 path"
            exit 1
          fi
          echo "Ref name sanitized to: $SAFE_REF"
          echo "REF_NAME=$SAFE_REF" >> "$GITHUB_ENV"
      - name: Build jbrowse-web
        uses: ./.github/actions/build-jbrowse-web
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Deploy to S3
        run: |
          cd products/jbrowse-web/build
          zip -r "jbrowse-web-${REF_NAME}.zip" .
          cp test_data/config.json config.json
          aws s3 sync --delete --exclude="*.map" . s3://jbrowse.org/code/jb2/${REF_NAME}
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/code/jb2/${REF_NAME}/*"

      # The Astro examples-sites replace the old per-package Storybooks at the
      # same public URLs (/storybook/{lgv,app,cgv}/). Their astro `base` is the
      # fixed, unversioned prefix, so each deploys to the prefix root. No
      # --delete: the canonical site overlays the prefix without touching any
      # historical per-ref Storybook subdirs (e.g. /storybook/lgv/v3.0.0/).
      # Prerelease tags (v5.0.0-beta.1 etc, carrying a '-') are excluded: the
      # prefix is unversioned and public, so a beta tag would replace the live
      # demos the embedded-component docs link to. Same guard as release.yml's
      # code/jb2/latest deploy.
      - name: Build and deploy examples-sites
        if:
          github.ref == 'refs/heads/main' || (startsWith(github.ref,
          'refs/tags/') && !contains(github.ref_name, '-'))
        run: |
          # site filter -> product dir -> public S3 prefix
          for entry in \
            "lgv-examples-site:jbrowse-react-linear-genome-view:lgv" \
            "app-examples-site:jbrowse-react-app:app" \
            "cgv-examples-site:jbrowse-react-circular-genome-view:cgv"; do
            IFS=: read -r filter dir prefix <<<"$entry"
            pnpm --filter "$filter" build
            aws s3 sync "products/$dir/examples-site/dist" "s3://jbrowse.org/storybook/$prefix"
          done
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/storybook/lgv/*" "/storybook/app/*" "/storybook/cgv/*"

  # Builds each Astro examples-site with Vite/Rollup (whose strict ESM surfaces
  # circular-dependency init-order errors that webpack tolerates), then loads
  # every page in headless Chrome. The web-worker examples assert an RPC worker
  # actually spawns — the guard for the TextSearchManager-class of TDZ crashes.
  # It also dead-link-checks each built site: internal links and anchors via
  # untitaker/hyperlink, plus the jbrowse.org/jb2/docs reference links via
  # check-links.
  # See products/jbrowse-react-linear-genome-view/examples-site/MIGRATION.md.
  examples_site_smoke:
    name: Smoke-test ${{ matrix.site }} examples-site
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: lgv-examples-site
            dir: jbrowse-react-linear-genome-view
            prefix: lgv
          - site: app-examples-site
            dir: jbrowse-react-app
            prefix: app
          - site: cgv-examples-site
            dir: jbrowse-react-circular-genome-view
            prefix: cgv
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Typecheck examples-site
        run: pnpm --filter ${{ matrix.site }} typecheck
      - name: Build examples-site
        run: pnpm --filter ${{ matrix.site }} build
      # Validate the absolute jbrowse.org/jb2/docs/* reference links in the
      # prose against the local website/docs tree. A renamed or removed
      # generated doc page fails here.
      - name: Check doc-reference links resolve
        run: pnpm --filter ${{ matrix.site }} check-links
      # Dead-link + anchor check over the built HTML with untitaker/hyperlink
      # (same tool the website job uses). It crawls a directory as the site root
      # and only checks internal links, so external URLs stay untested and there
      # is no network flakiness. The built site's links are prefixed with its
      # astro `base` (/storybook/<prefix>), so mirror that layout under a crawl
      # root first, exactly like the website job stages dist into testing/jb2.
      # dist is copied, not moved, so the smoke step below still finds it.
      - name: Stage built site under its base path
        run: |
          rm -rf link-check
          mkdir -p link-check/storybook
          cp -r products/${{ matrix.dir }}/examples-site/dist \
            link-check/storybook/${{ matrix.prefix }}
      - name: Check examples-site links
        uses: untitaker/hyperlink@9375bc4063712ad490d5eb3d54df0b6aade15e54 # 0.3.2
        with:
          args: link-check/ --check-anchors
      - name: Smoke-test examples-site
        run: pnpm --filter ${{ matrix.site }} smoke

  buildwebsite:
    name: Build website
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          working-directory: website
      - name: Typecheck website
        run: pnpm typecheck
        working-directory: website
      - name: Build website
        run: |
          cd website/
          pnpm build
          node scripts/check-llms.ts
          mkdir testing
          mv dist testing/jb2
      - name: Check website links
        uses: untitaker/hyperlink@9375bc4063712ad490d5eb3d54df0b6aade15e54 # 0.3.2
        with:
          args: website/testing/ --check-anchors

  # Separate job for component_tests with no permissions.
  # These tests install npm packages without a yarn.lock, so untrusted
  # dependencies could potentially run malicious code. By isolating this
  # in a job with `permissions: {}`, we ensure that even if a rogue
  # dependency executes, it has no GitHub token access and cannot push
  # code, create issues/PRs, access secrets, or call GitHub APIs.
  component_tests:
    name: Test embedded components
    needs: build_and_pack_artifacts
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packed-artifacts
          path: component_tests/
      - name: Test embedded components
        run: |
          for dir in component_tests/lgv-vite component_tests/cgv-vite component_tests/app-vite; do
            echo "Testing $dir"
            (cd $dir && yarn install && yarn e2e)
          done

  # The external-plugin-author guard: the only job that resolves @jbrowse/*
  # through publishConfig exports maps and built esm/ (from packed tarballs)
  # rather than workspace-linked source, so a packaging break reddens here
  # before publish rather than in someone's plugin repo after. No permissions:
  # installs from a lockfile-less manifest, like the other component_tests.
  plugin_component_test:
    name: Test third-party plugin build
    needs: build_and_pack_artifacts
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          install: 'false'
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packed-artifacts
          path: component_tests/
      - name: Install from packed tarballs
        run: pnpm install --no-frozen-lockfile
        working-directory: component_tests/plugin-vite
      - name: Typecheck and build as a third-party plugin consumer
        run: pnpm build
        working-directory: component_tests/plugin-vite
      - name: Smoke-test the rendered display
        run: pnpm e2e
        working-directory: component_tests/plugin-vite

  # Test CLI on Node 18 to ensure compatibility with older Node versions.
  # This job has no permissions since it installs npm packages without a lockfile.
  test_cli_compat:
    name: Test CLI on Node 18
    needs: build_and_pack_artifacts
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '18'
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packed-artifacts
          path: component_tests/
      - name: Test CLI on Node 18
        run: |
          cd component_tests/cli-node18
          yarn install
          yarn testcli

  # Test @jbrowse/img to ensure the jb2export CLI works.
  # Requires Node ~24 for module.registerHooks API.
  # This job has no permissions since it installs npm packages without a lockfile.
  test_jbrowse_img:
    name: Test @jbrowse/img
    needs: build_and_pack_artifacts
    if: ${{ !contains(github.event.head_commit.message, '[update docs only]') }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packed-artifacts
          path: component_tests/
      - name: Test @jbrowse/img
        run: |
          cd component_tests/jbrowse-img
          yarn install
          yarn testimg

  windows_electron_e2e:
    name: Windows Electron E2E Tests
    needs: [test, typecheck, lint, format]
    if:
      ${{ !contains(github.event.head_commit.message, '[update docs only]') &&
      github.ref == 'refs/heads/main' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build and test Electron on Windows
        run: pnpm test:e2e:ci:win
        working-directory: products/jbrowse-desktop
        env:
          NO_MINIMIZE: true
