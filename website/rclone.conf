# rclone config for uploading the built website (dist/) to S3 by content hash.
# No secrets here: env_auth picks up the same AWS profile/env the aws CLI uses.

[s3]
type = s3
provider = AWS
env_auth = true
region = us-east-1

# Wrap the local dist/ so md5s are cached in a local db and unchanged files
# aren't re-hashed every run.
[disthash]
type = hasher
remote = dist
hashes = md5
max_age = off
